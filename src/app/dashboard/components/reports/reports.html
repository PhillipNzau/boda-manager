<!-- REPORT SCREEN -->
<div class="screen active" id="screen-report">
  <div class="top-header">
    <div class="header-left">
      <h1>Analytics</h1>
      <h2>Reports</h2>
    </div>
    <div class="header-actions">
      <div class="icon-btn" onclick="App.exports.csv()">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          width="18"
          height="18"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="App.reports.setTab('week', this)">
      Weekly
    </div>
    <div class="tab" onclick="App.reports.setTab('month', this)">Monthly</div>
    <div class="tab" onclick="App.reports.setTab('calendar', this)">
      Calendar
    </div>
  </div>

  <div id="report-week">
    <div class="section-header"><h3>This Week</h3></div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="sc-icon">💰</div>
        <div class="sc-val" id="wk-income">KES 0</div>
        <div class="sc-lbl">Total Collected</div>
        <div class="sc-trend trend-up" id="wk-rate">0% collection rate</div>
      </div>
      <div class="stat-card">
        <div class="sc-icon">❌</div>
        <div class="sc-val" id="wk-missed">0</div>
        <div class="sc-lbl">Days Missed</div>
        <div class="sc-trend trend-down" id="wk-loss">KES 0 lost</div>
      </div>
    </div>
    <div class="section-header"><h3>Daily Breakdown</h3></div>
    <div class="bar-chart-container" id="weekBarChart"></div>
  </div>

  <div id="report-month" style="display: none">
    <div class="section-header"><h3>This Month</h3></div>
    <div class="chart-wrapper">
      <div class="chart-card">
        <h4>Expenses Report</h4>
        <div class="chart-total" id="monthDonutTotal">KES 0</div>
        <div class="donut-container">
          <svg
            width="120"
            height="120"
            viewBox="0 0 120 120"
            id="donutSvg"
          ></svg>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>
    </div>
    <div class="section-header"><h3>Monthly History</h3></div>
    <div id="monthHistory" style="padding: 0 20px"></div>
  </div>

  <div id="report-calendar" style="display: none">
    <div class="month-picker">
      <button class="month-nav" onclick="App.calendar.prev()">‹</button>
      <span id="calMonthLabel">November 2025</span>
      <button class="month-nav" onclick="App.calendar.next()">›</button>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
    <div
      style="
        display: flex;
        gap: 8px;
        padding: 0 20px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      "
    >
      <span class="status-pill status-paid">✓ Paid</span>
      <span class="status-pill status-missed">✗ Missed</span>
      <span class="status-pill status-partial">~ Partial</span>
      <span class="status-pill status-pending">• Pending</span>
    </div>
    <div class="section-header"><h3>Mark Payments</h3></div>
    <div id="dailyPaymentRows"></div>
  </div>
</div>
