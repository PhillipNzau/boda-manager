        margin-bottom: 24px;

            margin-top: 2px;
            font-family: &quot;DM Mono&quot;, monospace;
          "
          id="settingsJoined"
        >
          Since Jan 2025
        </div>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <h4>Preferences</h4>
    <div class="settings-item" (click)="toggleTheme()">
      <div class="si-icon" style="background: #fef3c7; font-size: 18px">🌙</div>

      <div class="si-text">
        <p>Dark Mode</p>
        <small>Toggle app theme</small>
      </div>

      <div
        class="toggle-switch"
        [class.on]="storageService.state.settings.darkMode"
      ></div>
    </div>
    <div class="settings-item">
      <div class="si-icon" style="background: #eff6ff; font-size: 18px">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#0869ff"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-bell-icon lucide-bell"
        >
          <path d="M10.268 21a2 2 0 0 0 3.464 0" />
          <path
            d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"
          />
        </svg>
      </div>
      <div class="si-text">
        <p>Notifications</p>
        <small>Payment reminders</small>
      </div>
      <div
        class="toggle-switch on"
        id="notifToggle"
        onclick="this.classList.toggle('on')"
      ></div>
    </div>
  </div>

  <div class="settings-section">
    <h4>Data</h4>
    <div class="settings-item" (click)="downloadReport()">
      <div class="si-icon" style="background: #ecfdf5; font-size: 18px">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#ff7e00"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-download-icon lucide-download"
        >
          <path d="M12 15V3" />
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <path d="m7 10 5 5 5-5" />
        </svg>
      </div>
      <div class="si-text">
        <p>Export to CSV</p>
        <small>Download all transactions</small>
      </div>
      <svg
        class="si-chevron"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        width="16"
        height="16"
      >
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </div>
    <div class="settings-item" (click)="logOut()">
      <div class="si-icon" style="background: #fef2f2; font-size: 18px">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#ff343b"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-user-key-icon lucide-user-key"
        >
          <path d="M20 11v6" />
          <path d="M20 13h2" />
          <path d="M3 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 2.072.578" />
          <circle cx="10" cy="7" r="4" />
          <circle cx="20" cy="19" r="2" />
        </svg>
      </div>
      <div class="si-text">
        <p style="color: var(--red-500)">Sign Out</p>
        <small>Log out of this device</small>
      </div>
    </div>
  </div>
</div>
